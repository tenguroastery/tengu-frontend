<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Cyber Tengu Roastery 20% OFF 1 al 3 de junio, código CYBER2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F0F0F"/>
      <stop offset="1" stop-color="#15151b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#C8842A" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C8842A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E63946"/>
      <stop offset="1" stop-color="#b71f2d"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- Franja diagonal coral de acento -->
  <polygon points="0,640 1600,470 1600,560 0,730" fill="url(#coral)" opacity="0.92"/>
  <!-- Línea fina mostaza -->
  <rect x="110" y="150" width="120" height="8" rx="4" fill="#C8842A"/>

  <!-- Texto promo (zona izquierda/centro) -->
  <text x="112" y="205" font-family="'Arial Black','Helvetica Neue',sans-serif" font-weight="900"
        font-size="40" letter-spacing="14" fill="#C8842A">EN TENGU ROASTERY</text>

  <text x="104" y="400" font-family="'Arial Black',Impact,sans-serif" font-weight="900"
        font-size="250" letter-spacing="6" fill="#C8842A">CYBER</text>

  <text x="112" y="560" font-family="'Arial Black',Impact,sans-serif" font-weight="900"
        font-size="150" letter-spacing="2" fill="#E63946">20% OFF</text>
  <text x="120" y="615" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700"
        font-size="34" letter-spacing="6" fill="#F5F1EA">EN TODO EL CATÁLOGO</text>

  <text x="112" y="715" font-family="'Arial Black',Impact,sans-serif" font-weight="900"
        font-size="62" letter-spacing="3" fill="#F5F1EA">1 &#8594; 3 DE JUNIO</text>

  <!-- Pill del código -->
  <rect x="112" y="760" width="560" height="78" rx="39" fill="#1F4E9C"/>
  <text x="148" y="812" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700"
        font-size="30" letter-spacing="4" fill="#F5F1EA">CÓDIGO</text>
  <text x="320" y="813" font-family="'Arial Black',Impact,sans-serif" font-weight="900"
        font-size="40" letter-spacing="3" fill="#F5F1EA">CYBER2026</text>

  <!-- Taza de café estilizada (derecha) -->
  <g transform="translate(1140 250)" stroke="#F5F1EA" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- vapor -->
    <path d="M120 -40 q-30 -45 0 -90 q30 -45 0 -90" stroke="#C8842A" opacity="0.85"/>
    <path d="M200 -40 q-30 -45 0 -90 q30 -45 0 -90" stroke="#C8842A" opacity="0.6"/>
    <!-- cuerpo de la taza -->
    <path d="M40 40 L300 40 L276 250 q-8 60 -68 60 L132 310 q-60 0 -68 -60 Z" fill="#1F4E9C"/>
    <!-- borde superior -->
    <ellipse cx="170" cy="40" rx="130" ry="34" fill="#0F0F0F"/>
    <!-- asa -->
    <path d="M300 80 q90 10 78 95 q-12 70 -92 70"/>
    <!-- platillo -->
    <ellipse cx="170" cy="345" rx="180" ry="30" fill="none" stroke="#C8842A"/>
  </g>

  <!-- Firma inferior -->
  <text x="112" y="870" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="600"
        font-size="26" letter-spacing="6" fill="#F5F1EA" opacity="0.75">CAFÉ DE ESPECIALIDAD · TOSTADO EN CHILE</text>
</svg>
