# Netlify config — vdng / tengu-frontend
#
# Build: `npm run build` (incluye sitemap + prerender SSG).
# Publish: `dist/`.
#
# Proxies de /api y /uploads al backend Azure App Service para mantener URLs
# root-relative igual que en dev (donde Vite proxia a localhost:8000).
# Si renombras el App Service en Azure, actualiza el host abajo.

[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # PRERENDER_API_BASE: si está seteado, el postbuild prerender script
  # (scripts/prerender.mjs) fetchea la lista actual de slugs de productos y
  # posts desde el backend prod en lugar del seed JSON local. Productos/posts
  # creados desde /admin quedan así prerendered al próximo deploy.
  PRERENDER_API_BASE = "https://tengu-backend.azurewebsites.net/api"

# Estas env vars NO se setean en el repo: defínelas en Netlify Site Settings →
# Environment variables. Si faltan, el sitio funciona pero sin tracking ni
# Google Login:
#   VITE_API_BASE           opcional (default '/api', proxy a Azure)
#   VITE_GOOGLE_CLIENT_ID   opcional (sin esto, login con Google no carga)
#   VITE_GA_ID              opcional (sin esto, GA4 no carga)

# --- Proxy al backend Azure ---
[[redirects]]
  from   = "/api/*"
  to     = "https://tengu-backend.azurewebsites.net/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/uploads/*"
  to     = "https://tengu-backend.azurewebsites.net/uploads/:splat"
  status = 200
  force  = true

# --- Redirects legacy (port de vercel.json) ---
[[redirects]]
  from   = "/shop"
  to     = "/tienda"
  status = 301

[[redirects]]
  from   = "/shop/*"
  to     = "/cafe/:splat"
  status = 301

[[redirects]]
  from   = "/cart"
  to     = "/carrito"
  status = 301

# --- SPA fallback (debe ir al final) ---
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
