# Netlify config — vdng / tengu-frontend
#
# Build: `npm run build` (incluye sitemap + prerender SSG).
# Publish: `dist/`.
#
# Proxies de /api y /uploads al backend Render para mantener URLs
# root-relative igual que en dev (donde Vite proxia a localhost:8000).
# Si renombras el servicio en Render, actualiza el host abajo.

[build]
  base    = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# --- Proxy al backend Render ---
[[redirects]]
  from   = "/api/*"
  to     = "https://tengu-backend.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/uploads/*"
  to     = "https://tengu-backend.onrender.com/uploads/:splat"
  status = 200
  force  = true

# --- Redirects legacy (port de vercel.json) ---
[[redirects]]
  from   = "/shop"
  to     = "/tienda"
  status = 301

[[redirects]]
  from   = "/shop/*"
  to     = "/cafe/:splat"
  status = 301

[[redirects]]
  from   = "/cart"
  to     = "/carrito"
  status = 301

# --- SPA fallback (debe ir al final) ---
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
